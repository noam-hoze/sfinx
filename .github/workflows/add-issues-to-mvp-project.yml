name: Add issues to MVP project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to MVP project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/noam-hoze/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
