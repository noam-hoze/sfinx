# GitHub Actions workflow to run Vitest on push and pull requests
# - Detects package manager (pnpm/yarn/npm) and installs dependencies
# - Runs Vitest in CI mode
# - Uploads coverage/results artifacts for inspection
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

name: Vitest

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test
        env:
          CI: true

      - name: Upload Vitest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-node-${{ matrix.node-version }}
          path: |
            coverage
            vitest-results
            vitest-report
            *.xml
            *.json
