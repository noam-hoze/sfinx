name: Bug Report
description: Report a bug or regression
title: "[Bug]: "
labels: ["bug"]
assignees: ["noam-hoze"]
body:
  - type: textarea
    id: current_state
    attributes:
      label: Current state
      description: What is happening today?
      placeholder: |
        We're scoring code quality when there was no user activity.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should happen instead?
      placeholder: |
        Stop scoring code quality when there was no user activity and indicate there was no user activity.
    validations:
      required: true
  - type: textarea
    id: repro_steps
    attributes:
      label: Repro steps
      description: Steps to reproduce the bug.
      placeholder: |
        1. Trigger scoring with an empty submission.
        2. Verify a score is produced.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Checklist of what "done" means.
      placeholder: |
        - [ ] Detect empty/no-op submissions and skip scoring.
        - [ ] Ensure report displays "no activity" instead of a score.
    validations:
      required: true
