<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ensure the app takes full height */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #root { height: 100%; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- YOUR ICONS ---
    const IconChevronLeft = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconPlay = ({ fill = "none", size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const IconShield = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    const IconZap = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const IconUsers = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconSearch = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const IconBarChart = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
    const IconCheck = ({ size = 24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
    const IconBrain = ({ size = 24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54Z"/></svg>;
    const SfinxLogo = ({ width = 440 }) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={width * 120/440} viewBox="-12 2 10 100" preserveAspectRatio="xMinYMin meet"><defs><linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#7e3ace"/><stop offset="100%" stopColor="#7e3ace"/></linearGradient><linearGradient id="shineOverlay" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="30%" stopColor="white" stopOpacity="0"/><stop offset="50%" stopColor="white" stopOpacity="0.35"/><stop offset="70%" stopColor="white" stopOpacity="0"/></linearGradient></defs><text x="0" y="6" fontFamily="Orbitron, sans-serif" fontSize="120" fontWeight="700" textAnchor="start" dominantBaseline="hanging" fill="url(#baseGradient)">SFINX</text><text x="0" y="6" fontFamily="Orbitron, sans-serif" fontSize="120" fontWeight="700" textAnchor="start" dominantBaseline="hanging" fill="url(#shineOverlay)">SFINX</text></svg>;

    // --- YOUR APP COMPONENTS ---
    const Slide = ({ children, isActive, title, subtitle }) => (
      <div className={`absolute inset-0 transition-all duration-700 ease-in-out flex flex-col items-center justify-center p-8 md:p-16 ${isActive ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-20 pointer-events-none'}`}>
        <div className="max-w-6xl w-full">
          {title && (
            <div className="mb-8 md:mb-12">
              <h2 className="text-xs md:text-sm font-bold tracking-widest text-[#9054d5] uppercase mb-2">{subtitle}</h2>
              <h1 className="text-3xl md:text-5xl font-bold text-white leading-tight">{title}</h1>
              <div className="h-1 w-16 md:w-20 bg-[#9054d5] mt-4 md:mt-6 rounded-full"></div>
            </div>
          )}
          {children}
        </div>
      </div>
    );

    const App = () => {
      const [currentSlide, setCurrentSlide] = useState(0);

      const slides = [
        {
          subtitle: "The Future of Technical Hiring",
          title: "Sfinx",
          content: (
            <div className="flex flex-col items-center text-center">
              <div className="mb-8">
                <SfinxLogo width={400} />
              </div>
              <p className="text-xl md:text-3xl text-gray-400 max-w-2xl leading-relaxed">
                Evidence-based AI screening. <br/>
                <span className="text-white font-medium">Turning "resume guessing" into high-conviction hiring decisions.</span>
              </p>
            </div>
          )
        },
        {
          subtitle: "The Problem",
          title: "Hiring Signal is Broken",
          content: (
            <div className="grid md:grid-cols-3 gap-6 md:gap-8 mt-4">
              {[
                { icon: <IconSearch size={32}/>, label: "Weak Signal", desc: "Resumes and keyword filters fail to predict actual on-the-job performance." },
                { icon: <IconUsers size={32}/>, label: "Resource Drain", desc: "Engineering teams waste 4,000+ hours yearly on manual screens with low yield." },
                { icon: <IconBarChart size={32}/>, label: "Inconsistency", desc: "Evaluation varies by mood and experience. There is zero auditable proof." }
              ].map((item, i) => (
                <div key={i} className="bg-[#16161a] p-6 md:p-8 rounded-2xl border border-white/5 hover:border-[#9054d5]/50 transition-colors">
                  <div className="text-[#9054d5] mb-6">{item.icon}</div>
                  <h3 className="text-lg md:text-xl font-bold mb-3">{item.label}</h3>
                  <p className="text-sm md:text-base text-gray-400 leading-relaxed">{item.desc}</p>
                </div>
              ))}
            </div>
          )
        },
        {
          subtitle: "Our Insight",
          title: "Proof Over Intuition",
          content: (
            <div className="bg-[#9054d5]/5 border border-[#9054d5]/20 p-8 md:p-12 rounded-3xl relative overflow-hidden">
              <div className="absolute top-0 right-0 p-8 opacity-10">
                <IconZap size={200} />
              </div>
              <p className="text-2xl md:text-4xl font-light italic leading-snug relative z-10">
                "Hiring should be based on <span className="text-[#9054d5] font-bold">evidence</span>, providing a foundation for human intuition rather than a replacement for it."
              </p>
              <div className="mt-8 md:mt-12 flex items-center gap-4 relative z-10">
                <div className="h-px flex-grow bg-white/10"></div>
                <p className="text-gray-400 uppercase tracking-widest text-[10px] md:text-sm font-bold">The Sfinx Philosophy</p>
              </div>
            </div>
          )
        },
        {
          subtitle: "The Solution",
          title: "The AI Operating System for Hiring",
          content: (
            <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
              <div className="space-y-6">
                {[
                  { title: "Autonomous Interviewer", text: "Job-specific, dynamic conversations that adapt to candidate answers." },
                  { title: "AI-Native Verification", text: "Checks accountability and mastery when candidates use AI tools." },
                  { title: "Decision-Ready Artifacts", text: "Outputs ranked shortlists with high-signal evidence reels." }
                ].map((item, i) => (
                  <div key={i} className="flex gap-4">
                    <div className="mt-1 flex-shrink-0"><IconCheck size={24} className="text-[#9054d5]" /></div>
                    <div>
                      <h4 className="font-bold text-base md:text-lg">{item.title}</h4>
                      <p className="text-sm md:text-base text-gray-400">{item.text}</p>
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-[#16161a] rounded-2xl p-4 border border-white/5 shadow-2xl">
                <div className="aspect-video bg-black rounded-lg flex items-center justify-center relative group cursor-pointer">
                  <div className="absolute inset-0 bg-[#9054d5]/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg"></div>
                  <IconPlay fill="white" size={48} />
                  <div className="absolute bottom-4 left-4 right-4 h-1 bg-white/20 rounded-full overflow-hidden">
                    <div className="h-full bg-[#9054d5] w-1/3"></div>
                  </div>
                  <p className="absolute bottom-8 left-4 text-[10px] font-mono text-white/50 uppercase">sfinx_demo_clip_04.mp4</p>
                </div>
                <div className="mt-4 flex justify-between items-center px-2">
                  <span className="text-[10px] font-bold text-[#9054d5] tracking-widest">EVIDENCE REEL RECAP</span>
                  <span className="text-[10px] text-gray-500 uppercase">03:42 total review time</span>
                </div>
              </div>
            </div>
          )
        },
        {
          subtitle: "The Differentiator",
          title: "The Evidence Reel",
          content: (
            <div className="flex flex-col md:flex-row gap-6 md:gap-8">
              <div className="flex-1 bg-gradient-to-br from-[#16161a] to-[#0a0a0c] p-6 md:p-8 rounded-3xl border border-white/5">
                <h3 className="text-xl md:text-2xl font-bold mb-6">Stop Reviewing Interviews. <br/>Start Watching Evidence.</h3>
                <ul className="space-y-4 text-gray-400 text-sm md:text-base">
                  <li className="flex gap-2"><span>•</span> <span>Reduce a 60-min screen to a <b>3-minute high-signal review.</b></span></li>
                  <li className="flex gap-2"><span>•</span> <span>Timestamped citations for every strength and red flag.</span></li>
                  <li className="flex gap-2"><span>•</span> <span>Defensible artifacts for consensus-based hiring panels.</span></li>
                </ul>
                <div className="mt-8 md:mt-10 p-4 bg-white/5 rounded-xl border border-white/10">
                  <p className="text-sm text-gray-400 mb-2 italic">"I watched 7 minutes of clips instead of 7 hours of interviews."</p>
                  <p className="text-xs font-bold text-[#9054d5] uppercase tracking-wider">— VP Engineering @ Vayyar</p>
                </div>
              </div>
              <div className="w-full md:w-72 space-y-3">
                 {[1, 2, 3].map(n => (
                   <div key={n} className="bg-[#16161a] p-4 rounded-xl border border-white/5 flex gap-4 items-center opacity-70 hover:opacity-100 transition-opacity">
                     <div className="w-16 h-10 bg-black rounded flex items-center justify-center flex-shrink-0"><IconPlay size={12}/></div>
                     <div>
                       <p className="text-[10px] font-bold uppercase tracking-tight">Signal: System Thinking</p>
                       <p className="text-[9px] text-gray-500 uppercase tracking-widest">Clip {n} • 0:45s</p>
                     </div>
                   </div>
                 ))}
              </div>
            </div>
          )
        },
        {
          subtitle: "Technical Advantage",
          title: "Built for the Age of AI",
          content: (
            <div className="grid md:grid-cols-2 gap-8 items-center">
              <div className="space-y-8">
                <div>
                  <h3 className="text-xl md:text-2xl font-bold mb-4">Accountability-First Probing</h3>
                  <p className="text-sm md:text-base text-gray-400 leading-relaxed">
                    Traditional tests are broken by LLMs. Sfinx doesn't just detect AI use; it probes the **reasoning behind the code.**
                  </p>
                </div>
                <div className="bg-[#16161a] p-6 rounded-2xl border-l-4 border-[#9054d5]">
                   <p className="text-[10px] text-[#9054d5] font-mono mb-2 uppercase tracking-widest">Sfinx Probing Engine:</p>
                   <p className="text-sm font-medium italic">"The candidate used a complex generator pattern. Sfinx immediately asked to explain the memory implications of this choice vs. a list comprehension."</p>
                </div>
              </div>
              <div className="flex justify-center">
                <div className="relative">
                  <div className="absolute inset-0 bg-[#9054d5] blur-[80px] opacity-20 animate-pulse"></div>
                  <IconBrain size={160} className="text-[#9054d5] relative z-10" />
                </div>
              </div>
            </div>
          )
        },
        {
          subtitle: "Opportunity",
          title: "Market & Business Model",
          content: (
            <div className="grid md:grid-cols-2 gap-8 md:gap-12">
              <div className="space-y-6">
                <div className="bg-[#16161a] p-6 rounded-2xl border border-white/5">
                  <h4 className="text-[#9054d5] font-bold mb-2 uppercase tracking-widest text-xs">TAM: $144B HR Tech</h4>
                  <p className="text-sm text-gray-400">Wedge: $7.5B technical interview segment (SWE, ML, Data).</p>
                </div>
                <div className="bg-[#16161a] p-6 rounded-2xl border border-white/5">
                  <h4 className="text-[#9054d5] font-bold mb-2 uppercase tracking-widest text-xs">SaaS + Usage</h4>
                  <p className="text-sm text-gray-400">Enterprise: $10k-25k/yr + per-candidate screening fees.</p>
                </div>
              </div>
              <div className="space-y-6">
                <h4 className="font-bold text-lg md:text-xl mb-4">The Moat: The Evidence Layer</h4>
                <p className="text-sm text-gray-400 leading-relaxed">
                  As companies hire, Sfinx becomes the <b>system of record</b> for talent calibration. We don't just screen; we define what "good" looks like for your specific organization.
                </p>
                <div className="flex flex-wrap gap-2 md:gap-4 items-center">
                  {['Vayyar', 'Dig', 'Nexite'].map(partner => (
                    <div key={partner} className="px-3 py-1 md:px-4 md:py-2 bg-white/5 rounded-full text-[10px] font-bold border border-white/10 uppercase tracking-widest text-gray-400">{partner}</div>
                  ))}
                </div>
              </div>
            </div>
          )
        },
        {
          subtitle: "The Ask",
          title: "Invest in the Future of Work",
          content: (
            <div className="text-center space-y-8 md:space-y-12">
              <p className="text-lg md:text-2xl text-gray-400">Help us scale the first E2E AI system that runs recruitment from <span className="text-white font-bold underline decoration-[#9054d5] decoration-2 underline-offset-4">lead to offer</span>.</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                <div className="p-4 bg-[#16161a] rounded-xl"><p className="text-[#9054d5] font-bold text-xl">$1.5M</p><p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Seed Round</p></div>
                <div className="p-4 bg-[#16161a] rounded-xl"><p className="text-[#9054d5] font-bold text-xl">18m</p><p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Runway</p></div>
                <div className="p-4 bg-[#16161a] rounded-xl"><p className="text-[#9054d5] font-bold text-xl">15+</p><p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Pilot Teams</p></div>
                <div className="p-4 bg-[#16161a] rounded-xl"><p className="text-[#9054d5] font-bold text-xl">80%</p><p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Time Saved</p></div>
              </div>
              <div className="pt-4 md:pt-8">
                <h3 className="text-2xl md:text-3xl font-bold mb-4 tracking-tight">Sfinx</h3>
                <p className="text-[#9054d5] font-mono tracking-tighter text-sm">www.sfinx.ai • founders@sfinx.ai</p>
              </div>
            </div>
          )
        }
      ];

      const nextSlide = () => setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
      const prevSlide = () => setCurrentSlide((prev) => (prev === 0 ? slides.length - 1 : prev - 1));

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight') nextSlide();
          if (e.key === 'ArrowLeft') prevSlide();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      return (
        <div className="min-h-screen bg-[#0a0a0c] text-white font-sans selection:bg-[#9054d5] selection:text-white overflow-hidden flex flex-col relative">
          {/* Background Decor */}
          <div className="fixed inset-0 pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#9054d5] opacity-5 blur-[120px] rounded-full"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#9054d5] opacity-5 blur-[120px] rounded-full"></div>
          </div>

          {/* Slide Container */}
          <main className="flex-grow relative">
            {slides.map((slide, index) => (
              <Slide 
                key={index} 
                isActive={currentSlide === index} 
                title={slide.title} 
                subtitle={slide.subtitle}
              >
                {slide.content}
              </Slide>
            ))}
          </main>

          {/* Navigation Footer */}
          <footer className="p-8 md:px-12 flex justify-between items-center relative z-20">
            <div className="flex gap-1">
              {slides.map((_, i) => (
                <div 
                  key={i} 
                  className={`h-1 transition-all duration-300 rounded-full ${i === currentSlide ? 'w-8 bg-[#9054d5]' : 'w-2 bg-white/10'}`}
                />
              ))}
            </div>
            <div className="flex gap-3 md:gap-4">
              <button 
                onClick={prevSlide}
                className="p-3 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-colors text-white"
                aria-label="Previous slide"
              >
                <IconChevronLeft />
              </button>
              <button 
                onClick={nextSlide}
                className="p-3 rounded-full bg-[#9054d5] hover:bg-[#a66ee3] shadow-lg shadow-[#9054d5]/20 transition-all hover:scale-105 text-white"
                aria-label="Next slide"
              >
                <IconChevronRight />
              </button>
            </div>
          </footer>

          <div className="absolute bottom-6 left-1/2 -translate-x-1/2 text-[8px] md:text-[10px] text-gray-600 font-mono hidden md:block uppercase tracking-widest">
            Use Arrow Keys to Navigate
          </div>
        </div>
      );
    };

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
